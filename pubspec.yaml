name: iso_weather
description: "Minicast — 아이소메트릭 감성 날씨 앱"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1

  # Networking
  http: ^1.3.0

  # Location
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # Storage
  shared_preferences: ^2.5.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Network Status
  connectivity_plus: ^6.1.4

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0

  # Utilities
  intl: ^0.19.0
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.6

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon_option_a.png"
  adaptive_icon_background: "#87CEEB"
  adaptive_icon_foreground: "assets/icon/icon_option_a.png"

flutter_native_splash:
  color: "#87CEEB"
  image: "assets/icon/splash_text.png"
  color_dark: "#87CEEB"
  image_dark: "assets/icon/splash_text.png"
  android_12:
    color: "#87CEEB"
    image: "assets/icon/splash_text.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/cities/
    - assets/images/base/
    - assets/data/
    - .env

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-Light.ttf
          weight: 300
